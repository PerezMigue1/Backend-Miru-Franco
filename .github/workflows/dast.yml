# DAST = Dynamic Application Security Testing
# Prueba la API backend DESPLEGADA (staging/producción) con OWASP ZAP.

name: DAST - OWASP ZAP Baseline (backend)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL backend desplegada a escanear (default: https://api.mirufranco.com)'
        required: false
        type: string
  push:
    branches: [main]

jobs:
  dast:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve DAST target URL
        id: resolve_target
        run: |
          TARGET_INPUT="${{ github.event.inputs.target_url }}"
          TARGET_SECRET="${{ secrets.DAST_TARGET_URL }}"
          TARGET_DEFAULT="https://api.mirufranco.com"
          TARGET_URL="${TARGET_INPUT:-${TARGET_SECRET:-$TARGET_DEFAULT}}"

          if [ -z "$TARGET_URL" ]; then
            echo "::error::No hay URL objetivo. Define workflow input target_url o el secreto DAST_TARGET_URL."
            exit 1
          fi

          if [[ ! "$TARGET_URL" =~ ^https?:// ]]; then
            echo "::error::DAST_TARGET_URL debe iniciar con http:// o https://"
            exit 1
          fi

          echo "target_url=$TARGET_URL" >> "$GITHUB_OUTPUT"
          echo "DAST backend apuntará a: $TARGET_URL"

      - name: Validate target reachability
        run: |
          TARGET_URL="${{ steps.resolve_target.outputs.target_url }}"
          echo "Probando conectividad con: $TARGET_URL"
          curl -L --retry 4 --retry-delay 8 --connect-timeout 20 --max-time 180 -I "$TARGET_URL"

      - name: Clean previous local reports
        run: rm -f report_*

      - name: Check if ZAP rules file exists
        id: zap_rules
        run: |
          if [ -f .zap/rules.tsv ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Usando .zap/rules.tsv"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No se encontró .zap/rules.tsv; se ejecutará ZAP sin reglas personalizadas."
          fi

      - name: OWASP ZAP Baseline Scan (Docker CLI)
        run: |
          set -o pipefail
          TARGET_URL="${{ steps.resolve_target.outputs.target_url }}"
          RULES_OPT=""
          if [ "${{ steps.zap_rules.outputs.found }}" = "true" ]; then
            RULES_OPT="-c /zap/wrk/.zap/rules.tsv"
          fi

          echo "Ejecutando ZAP baseline para backend: $TARGET_URL"
          docker pull ghcr.io/zaproxy/zaproxy:stable
          set +e
          docker run --rm --user root -v "$(pwd):/zap/wrk/:rw" -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t "$TARGET_URL" \
            -a -j \
            -l WARN \
            $RULES_OPT \
            -r report_html.html
          ZAP_EXIT=${PIPESTATUS[0]}
          set -e

          # 0/1/2: scan completo con posibles alertas; >2: error operativo
          if [ "$ZAP_EXIT" -le 2 ]; then
            echo "ZAP finalizó con código $ZAP_EXIT (escaneo completado con alertas o warnings)."
            exit 0
          fi

          echo "::error::ZAP falló por error operativo (exit code: $ZAP_EXIT)."
          exit "$ZAP_EXIT"

      - name: Inspect generated ZAP reports
        id: reports
        run: |
          echo "Buscando reporte HTML generado por ZAP..."
          ls -la report_html.html 2>/dev/null || true
          if [ -f report_html.html ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Se encontró report_html.html."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::error::ZAP no generó report_html.html en esta ejecución."
            exit 1
          fi

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          if-no-files-found: warn
          retention-days: 30
