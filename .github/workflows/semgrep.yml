

name: SAST - Semgrep (backend)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep/ci → Semgrep Cloud (NestJS)
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan (Semgrep Cloud + SARIF)
        id: semgrep_scan
        continue-on-error: true
        run: |
          docker run --rm \
            -e SEMGREP_APP_TOKEN \
            -e SEMGREP_BRANCH="${GITHUB_REF_NAME}" \
            -e SEMGREP_COMMIT="${GITHUB_SHA}" \
            -e SEMGREP_JOB_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -e SEMGREP_REPO_NAME="${GITHUB_REPOSITORY}" \
            -e SEMGREP_REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -e SEMGREP_PR_ID="${{ github.event.pull_request.number }}" \
            -v "${GITHUB_WORKSPACE}:/src" \
            --workdir /src \
            semgrep/semgrep:latest \
            semgrep ci --sarif --sarif-output=/src/semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Check SARIF artifact
        id: sarif_check
        if: always()
        run: |
          if [ -f "${GITHUB_WORKSPACE}/semgrep.sarif" ]; then
            echo "has_sarif=true" >> "$GITHUB_OUTPUT"
            ls -la "${GITHUB_WORKSPACE}/semgrep.sarif"
          else
            echo "has_sarif=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No se generó semgrep.sarif. Revisa el log del escaneo, SEMGREP_APP_TOKEN y políticas en Semgrep Cloud."
          fi

      - name: Upload SARIF to GitHub Security
        if: always() && steps.sarif_check.outputs.has_sarif == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Fail job if Semgrep scan failed
        if: always() && steps.semgrep_scan.outcome == 'failure'
        run: |
          echo "::error::El escaneo Semgrep falló. Corrige el error anterior en este job."
          exit 1
