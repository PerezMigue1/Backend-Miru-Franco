name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Solo para prisma generate (no se conecta a la DB en este job)
      DATABASE_URL: postgresql://test:test@localhost:5432/test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate

      - name: Generar cobertura (Jest)
        run: npm run test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          # Token de SonarCloud (secret en el repo, ej. SONAR_TOKEN o sast)
          SONAR_TOKEN: ${{ secrets.sast }}
        with:
          args: >-
            -Dsonar.projectKey=PerezMigue1_Backend-Miru-Franco
            -Dsonar.organization=idashido
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.exclusions=**/node_modules/**,**/dist/**
