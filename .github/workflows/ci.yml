# CI: pruebas y build en cada push (y en pull requests)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Opt-in a Node.js 24 para las acciones (evita el aviso de deprecación de Node 20)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Base de datos del contenedor de CI (no uses tu DB real aquí)
      DATABASE_URL: postgresql://test:test@localhost:5432/test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Ejecutar pruebas
        run: npm test
