name: Recalcular reglas de asociación

on:
  schedule:
    # 08:00 UTC = 02:00 hora Hidalgo, MX (UTC-6) — horario de bajo tráfico
    - cron: '0 8 * * *'
  workflow_dispatch: {}  # permite correrlo manualmente desde la pestaña Actions

jobs:
  recalcular:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/ml/requirements.txt

      - name: Instalar dependencias
        run: pip install -r scripts/ml/requirements.txt

      - name: Recalcular reglas de asociación
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/ml/recalcular_reglas.py
