services:
  - type: web
    name: backend-miru
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /salud
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Agregar estas variables en el dashboard de Render:
      # - DATABASE_URL (PostgreSQL/Neon connection string)
      # - JWT_SECRET
      # - SENDGRID_API_KEY
      # - SENDGRID_FROM_EMAIL
      # - SENDGRID_FROM_NAME
      # - GOOGLE_CLIENT_ID
      # - GOOGLE_CLIENT_SECRET
      # - BACKEND_URL
      # - FRONTEND_URL
      # Datadog (APM + AppSec + IAST): definir en el dashboard de Render, NO commitear secretos:
      # - DD_API_KEY
      # - DD_SITE (ej. datadoghq.com o el site de tu org)
      # - DD_SERVICE, DD_ENV, DD_VERSION
      # - DD_TRACE_ENABLED=true
      # - DD_APPSEC_ENABLED=true
      # - DD_IAST_ENABLED=true
